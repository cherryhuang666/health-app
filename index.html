<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="张婷要健康" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%A9%BA%3C/text%3E%3C/svg%3E" />
  <title>张婷要健康</title>

  <!-- Tailwind via Play CDN (no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
              800: '#075985', 900: '#0c4a6e'
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"PingFang SC"', '"Microsoft YaHei"', 'Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Chart.js for analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- SheetJS for Excel import/export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <!-- ========== App shell ========== -->
  <div id="app" class="min-h-screen pb-24 max-w-3xl mx-auto">

    <!-- Top bar -->
    <header class="sticky top-0 z-30 bg-gradient-to-r from-brand-500 to-brand-600 text-white shadow-md">
      <div class="px-4 pt-3 pb-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-2xl">🩺</span>
          <div>
            <div class="text-base font-semibold leading-tight" id="pageTitle">张婷要健康！</div>
            <div class="text-xs text-brand-100 leading-tight" id="pageSubtitle">今天 · 概览</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="searchBtn" class="p-2 rounded-full hover:bg-white/10 active:bg-white/20" title="搜索">
            🔍
          </button>
          <button id="menuBtn" class="p-2 rounded-full hover:bg-white/10 active:bg-white/20" title="菜单">
            ⋯
          </button>
        </div>
      </div>
    </header>

    <!-- Page container -->
    <main id="pageContainer" class="p-4 space-y-4"></main>
  </div>

  <!-- ========== Bottom navigation ========== -->
  <nav class="fixed bottom-0 inset-x-0 z-30 bg-white border-t border-slate-200 shadow-[0_-2px_8px_rgba(0,0,0,0.04)]">
    <div class="max-w-3xl mx-auto grid grid-cols-5">
      <button class="nav-btn flex flex-col items-center justify-center py-2.5 text-xs gap-0.5 text-slate-500" data-page="dashboard">
        <span class="text-xl">🏠</span><span>首页</span>
      </button>
      <button class="nav-btn flex flex-col items-center justify-center py-2.5 text-xs gap-0.5 text-slate-500" data-page="daily">
        <span class="text-xl">📝</span><span>每日记录</span>
      </button>
      <button class="nav-btn relative -mt-6 flex flex-col items-center justify-center" data-page="quickAdd">
        <span class="w-14 h-14 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white shadow-lg flex items-center justify-center text-2xl ring-4 ring-white">＋</span>
      </button>
      <button class="nav-btn flex flex-col items-center justify-center py-2.5 text-xs gap-0.5 text-slate-500" data-page="visits">
        <span class="text-xl">🏥</span><span>看诊</span>
      </button>
      <button class="nav-btn flex flex-col items-center justify-center py-2.5 text-xs gap-0.5 text-slate-500" data-page="more">
        <span class="text-xl">⋯</span><span>更多</span>
      </button>
    </div>
  </nav>

  <!-- ========== Modal root ========== -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="fixed bottom-24 inset-x-0 z-50 flex flex-col items-center gap-2 pointer-events-none"></div>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
